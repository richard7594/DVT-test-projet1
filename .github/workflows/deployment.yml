name : Terraform_deploy
on:
  push:
    branches:
    - 'main'
  workflow_dispatch:  

env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:

  _fmt_:
    name: fmt
    runs-on: ubuntu-latest
    environment: DEV
    container:
      image: hashicorp/terraform:latest
    steps:
    - uses: actions/checkout@v6
    - name : init 
      run : terraform init -backend-config='./backends/backend.hcl'
    - name: fmt
      run : terraform fmt --recursive
    - uses: actions/upload-artifact@v7
      with:
        name: fmt
        path: .  

  _validate_:
    name: validate
    runs-on: ubuntu-latest
    environment: DEV
    container:
      image: hashicorp/terraform:latest 
    steps:
    - uses: actions/download-artifact@v7
      with:
        name: fmt
    - name: init 
      run: terraform init -backend-config='./backends/backend.hcl'
    - name: validate
      run: terraform validate
    - uses: actions/upload-artifact@v7
      with:
        name: validate
        path: .  
    needs: _fmt_  
  
  _plan_:
    name: plan
    runs-on: ubuntu-latest
    environment: DEV
    container:
      image: hashicorp/terraform:latest
    steps:
    - uses: actions/download-artifact@v7
      with:
        name: validate
    - name: init 
      run: terraform init -backend-config='./backends/backend.hcl'
    - name: plan
      run: terraform plan -out=myplan
    - uses: actions/upload-artifact@v7
      with:
        name: myplan
        path: .
      

    needs: _validate_  

  _apply_:
    name: apply
    runs-on: ubuntu-latest
    environment: PRD
    container:
      image: hashicorp/terraform:latest  
    steps:
    - uses: actions/download-artifact@v7
      with:
        name: myplan
    - name: init 
      run: terraform init -backend-config='./backends/backend.hcl'
    - name: apply
      run: terraform apply myplan
    needs: _plan_        

  _destroy_:
    name: destroy
    runs-on: ubuntu-latest
    environment: PRD2
    container:
      image: hashicorp/terraform:latest  
    steps:
    - uses: actions/download-artifact@v7
      with:
        name: myplan
    - name: init 
      run: terraform init -backend-config='./backends/backend.hcl'
    - name: destroy
      run: terraform destroy --auto-approve
    needs: _plan_          